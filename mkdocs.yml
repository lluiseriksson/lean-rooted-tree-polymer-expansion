site_name: Lean Rooted-Tree Polymer Expansion
site_description: Machine-checked target-preserving Ursell leaf summation for polymer systems with holes
site_author: Lluis Eriksson
site_url: https://lluiseriksson.github.io/lean-rooted-tree-polymer-expansion/
repo_url: https://github.com/lluiseriksson/lean-rooted-tree-polymer-expansion
repo_name: lluiseriksson/lean-rooted-tree-polymer-expansion
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Lluis Eriksson · Documentation licensed CC BY 4.0

strict: true
not_in_nav: |
  404.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/print.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lluiseriksson/lean-rooted-tree-polymer-expansion
      name: Source repository

nav:
  - Overview:
      - Home: index.md
      - What this project is: about/overview.md
      - Claims and scope: about/claims.md
      - Notation and terminology: about/notation.md
      - Citation: about/citation.md
      - Machine-readable index: about/machine-readable.md
  - Integrated article:
      - Article landing: paper/index.md
      - Continuous reading view: generated/full-article.md
      - Reader guide: paper/00-reader-guide.md
      - 1. Introduction: paper/01-introduction.md
      - 2. Polymer systems with holes: paper/02-polymer-systems.md
      - 3. Rooted tree-profile bound: paper/03-rooted-tree-profile.md
      - 4. Parent-normalized moment kernels: paper/04-moment-kernels.md
      - 5. Fixed-tree leaf elimination: paper/05-fixed-tree-elimination.md
      - 6. Marked-root closure: paper/06-marked-root-closure.md
      - 7. Target-preserving decay: paper/07-target-preserving-decay.md
      - 8. Lean formalization: paper/08-lean-formalization.md
      - 9. Mathematical interpretation: paper/09-interpretation.md
      - 10. Related work: paper/10-related-work.md
      - 11. Limitations: paper/11-limitations.md
      - 12. Reproducibility: paper/12-reproducibility.md
      - 13. Conclusion: paper/13-conclusion.md
      - References: paper/references.md
      - Appendices:
          - Public theorem signatures: paper/appendix-a-signatures.md
          - Constant audit: paper/appendix-b-constants.md
          - Reviewer checklist: paper/appendix-c-reviewer-checklist.md
  - Formalization:
      - Lean theorem map: formalization/index.md
      - Machine-readable theorem map: artifact/theorem-map.md
      - Proof dependency graph: artifact/proof-dependency-graph.md
      - Source provenance: artifact/source-provenance.md
      - Build and oracle status: artifact/build-status.md
  - Artifact evaluation:
      - Verification contract: artifact/verification-contract.md
      - Reproducibility: artifact/reproducibility.md
      - Release evidence: artifact/release-evidence.md
      - Evaluation guide: artifact/evaluation.md
      - Reviewer FAQ: artifact/reviewer-faq.md
      - Claims and scope: artifact/scope.md
      - Supply-chain integrity: artifact/supply-chain.md
  - Publication:
      - Editorial positioning: publication/editorial-positioning.md
      - Abstract and highlights: publication/abstract-and-highlights.md
      - Cover letter: publication/cover-letter.md
      - Submission checklist: publication/submission-checklist.md
      - Author declarations: publication/author-declarations.md
      - Submission metadata: publication/submission-metadata.md
  - Maintainers:
      - Repository identity history: maintainers/repository-history.md
      - Release playbook: maintainers/release-playbook.md
      - Repository settings: maintainers/repository-settings.md
      - Agent handoff: maintainers/agent-handoff.md
      - Upload and migration: maintainers/upload-and-migration.md
      - Repository audit: maintainers/repository-audit.md
  - Legal and licensing: LICENSE.md
