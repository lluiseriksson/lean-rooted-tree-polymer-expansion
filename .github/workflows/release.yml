name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
      - name: Install documentation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt
      - name: Verify and package
        run: make release
      - name: Attest source archive provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*.zip
      - uses: actions/upload-artifact@v4
        with:
          name: source-release
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error
      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.zip release/*.sha256 --verify-tag --generate-notes
