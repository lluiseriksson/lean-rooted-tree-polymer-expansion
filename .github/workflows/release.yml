name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  verify-and-package:
    name: Verify and stage a deterministic release candidate
    if: github.repository == 'lluiseriksson/lean-rooted-tree-polymer-expansion'
    runs-on: ubuntu-latest
    timeout-minutes: 95
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.lock
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          auto-config: false
          build: true
          build-args: MarkedRootedClosure
          leanchecker: true
          use-github-cache: true
      - name: Install documentation dependencies
        run: |
          python -m pip install -r requirements-docs.lock
          python -m pip check
      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python3 - <<'PY'
          import json, os
          version = json.load(open('project.json', encoding='utf-8'))['version']
          tag = os.environ['GITHUB_REF_NAME']
          if tag != f'v{version}':
              raise SystemExit(f'tag {tag!r} does not match project version v{version}')
          PY
      - name: Audit exact oracle output
        run: make lean-oracle
      - name: Verify non-Lean layers and package twice
        run: make package-determinism
      - name: Stage the exact release directory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-release-candidate
          path: release/
          if-no-files-found: error
          retention-days: 2

  publish:
    name: Attest and publish without executing repository code
    needs: verify-and-package
    if: >-
      needs.verify-and-package.result == 'success' &&
      startsWith(github.ref, 'refs/tags/') &&
      github.repository == 'lluiseriksson/lean-rooted-tree-polymer-expansion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download the verified release candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: source-release-candidate
          path: release
      - name: Validate the exact release inventory
        id: inventory
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY_SLUG: lean-rooted-tree-polymer-expansion
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          tag = os.environ['RELEASE_TAG']
          match = re.fullmatch(r'v([0-9]+\.[0-9]+\.[0-9]+)', tag)
          if match is None:
              raise SystemExit(f'non-semantic release tag: {tag!r}')
          version = match.group(1)
          stem = f"{os.environ['REPOSITORY_SLUG']}-{tag}"
          release = Path('release')
          primary = [
              f'{stem}.zip',
              f'{stem}.spdx.json',
              f'{stem}.cdx.json',
              f'{stem}.buildinfo.json',
              f'{stem}.intoto.jsonl',
              f'{stem}.release.json',
          ]
          expected = primary + [f'{name}.sha256' for name in primary] + [
              f'{stem}.checksums.sha256'
          ]
          entries = list(release.iterdir()) if release.is_dir() else []
          irregular = sorted(
              path.name for path in entries if path.is_symlink() or not path.is_file()
          )
          if irregular:
              raise SystemExit('non-regular release entries: ' + ', '.join(irregular))
          actual = sorted(path.name for path in entries)
          if actual != sorted(expected):
              missing = sorted(set(expected) - set(actual))
              extra = sorted(set(actual) - set(expected))
              raise SystemExit(
                  f'exact release inventory mismatch; missing={missing}; unexpected={extra}'
              )

          def digest(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          for name in primary:
              path = release / name
              sidecar = release / f'{name}.sha256'
              canonical = f'{digest(path)}  {name}\n'.encode()
              if sidecar.read_bytes() != canonical:
                  raise SystemExit(f'non-canonical checksum sidecar: {sidecar.name}')
          aggregate = b''.join(
              f'{digest(release / name)}  {name}\n'.encode() for name in primary
          )
          aggregate_path = release / f'{stem}.checksums.sha256'
          if aggregate_path.read_bytes() != aggregate:
              raise SystemExit(f'non-canonical aggregate checksum: {aggregate_path.name}')

          index = json.loads((release / f'{stem}.release.json').read_text(encoding='utf-8'))
          release_record = index.get('release', {})
          if release_record.get('name') != stem or release_record.get('version') != version:
              raise SystemExit('release index identity does not match the tag')
          indexed_specs = [
              (primary[0], 'source-archive', 'application/zip'),
              (primary[1], 'spdx-sbom', 'application/spdx+json'),
              (primary[2], 'cyclonedx-sbom', 'application/vnd.cyclonedx+json'),
              (primary[3], 'build-information', 'application/json'),
              (primary[4], 'in-toto-provenance', 'application/jsonl'),
          ]
          indexed = index.get('artifacts')
          if not isinstance(indexed, list) or len(indexed) != len(indexed_specs):
              raise SystemExit('release index artifact count mismatch')
          for item, (name, role, media_type) in zip(indexed, indexed_specs):
              if not isinstance(item, dict):
                  raise SystemExit('release index artifact record must be an object')
              path = release / name
              expected_record = {
                  'name': name,
                  'role': role,
                  'media_type': media_type,
                  'bytes': path.stat().st_size,
                  'sha256': digest(path),
              }
              if item != expected_record:
                  raise SystemExit(f'release index artifact metadata mismatch: {name}')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'stem={stem}\n')
          print(f'exact release inventory: OK ({len(expected)} files)')
          PY
      - name: Attest source archive provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release/${{ steps.inventory.outputs.stem }}.zip
      - name: Attest release evidence provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            release/${{ steps.inventory.outputs.stem }}.spdx.json
            release/${{ steps.inventory.outputs.stem }}.cdx.json
            release/${{ steps.inventory.outputs.stem }}.buildinfo.json
            release/${{ steps.inventory.outputs.stem }}.intoto.jsonl
            release/${{ steps.inventory.outputs.stem }}.release.json
            release/${{ steps.inventory.outputs.stem }}.checksums.sha256
      - name: Publish the exact tagged asset set
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_STEM: ${{ steps.inventory.outputs.stem }}
        run: |
          assets=(
            "release/${RELEASE_STEM}.zip"
            "release/${RELEASE_STEM}.spdx.json"
            "release/${RELEASE_STEM}.cdx.json"
            "release/${RELEASE_STEM}.buildinfo.json"
            "release/${RELEASE_STEM}.intoto.jsonl"
            "release/${RELEASE_STEM}.release.json"
            "release/${RELEASE_STEM}.zip.sha256"
            "release/${RELEASE_STEM}.spdx.json.sha256"
            "release/${RELEASE_STEM}.cdx.json.sha256"
            "release/${RELEASE_STEM}.buildinfo.json.sha256"
            "release/${RELEASE_STEM}.intoto.jsonl.sha256"
            "release/${RELEASE_STEM}.release.json.sha256"
            "release/${RELEASE_STEM}.checksums.sha256"
          )
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag --generate-notes
