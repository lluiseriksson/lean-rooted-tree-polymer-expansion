name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  release:
    if: github.repository == 'lluiseriksson/lean-rooted-tree-polymer-expansion'
    runs-on: ubuntu-latest
    timeout-minutes: 95
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.lock
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          use-github-cache: true
      - name: Install documentation dependencies
        run: |
          python -m pip install -r requirements-docs.lock
          python -m pip check
      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import json, os
          version = json.load(open('project.json'))['version']
          tag = os.environ['GITHUB_REF_NAME']
          if tag != f'v{version}':
              raise SystemExit(f'tag {tag!r} does not match project version v{version}')
          PY
      - name: Verify and package twice
        run: make release
      - name: Attest source archive provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release/*.zip
      - name: Attest release evidence provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            release/*.spdx.json
            release/*.cdx.json
            release/*.buildinfo.json
            release/*.intoto.jsonl
            release/*.release.json
            release/*.checksums.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-release
          path: |
            release/*.zip
            release/*.sha256
            release/*.spdx.json
            release/*.cdx.json
            release/*.buildinfo.json
            release/*.intoto.jsonl
            release/*.release.json
            release/*.checksums.sha256
          if-no-files-found: error
      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/*.zip release/*.sha256 \
            release/*.spdx.json release/*.cdx.json release/*.buildinfo.json \
            release/*.intoto.jsonl release/*.release.json release/*.checksums.sha256 \
            --verify-tag --generate-notes
