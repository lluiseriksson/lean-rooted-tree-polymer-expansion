name: scheduled-maintenance

on:
  schedule:
    - cron: '23 4 1 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-maintenance
  cancel-in-progress: false

env:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  clean-room-verification:
    if: github.repository == 'lluiseriksson/lean-rooted-tree-polymer-expansion'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.lock
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          auto-config: false
          build: true
          build-args: MarkedRootedClosure
          leanchecker: true
          use-github-cache: false
      - name: Install documentation dependencies
        run: |
          python -m pip install -r requirements-docs.lock
          python -m pip check
      - name: Audit exact oracle output
        run: make lean-oracle
      - name: Non-Lean verification, deterministic package, and clean-room extraction
        run: make package-determinism
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scheduled-release-evidence
          path: release/
          if-no-files-found: error
          retention-days: 7
