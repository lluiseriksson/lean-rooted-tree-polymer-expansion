name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-docs:
    name: Static audit and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install documentation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt
      - name: Run static audit
        run: make static
      - name: Build documentation in strict mode
        run: make docs
      - uses: actions/upload-artifact@v4
        with:
          name: documentation-site
          path: site/
          if-no-files-found: error
          retention-days: 14

  lean:
    name: Lean kernel verification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
      - name: Build companion and print axioms
        run: make lean
