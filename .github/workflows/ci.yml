name: artifact-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
      - name: Build publication companion
        run: |
          lake update
          lake build MarkedRootedClosure
          lake env lean MarkedRootedClosure/Oracle.lean
      - name: Static audit
        run: |
          bash scripts/check_no_placeholders.sh

  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-base texlive-latex-extra \
            texlive-fonts-recommended texlive-science poppler-utils
      - name: Build paper
        run: make -C paper clean all
      - name: Check artifact files
        run: |
          python3 scripts/check_artifact.py
          bash scripts/check_pdf.sh
      - uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/main.pdf
