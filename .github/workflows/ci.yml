name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  static-and-docs:
    name: Tooling tests, static audit, and strict documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.lock
      - name: Install documentation dependencies
        run: |
          python -m pip install -r requirements-docs.lock
          python -m pip check
      - name: Run complete non-Lean verification
        run: make verify-nonlean
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: documentation-site
          path: site/
          if-no-files-found: error
          retention-days: 14

  package:
    name: Deterministic package, dual SBOMs, and clean-room smoke test
    runs-on: ubuntu-latest
    needs: static-and-docs
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.lock
      - name: Install documentation dependencies
        run: |
          python -m pip install -r requirements-docs.lock
          python -m pip check
      - name: Build and verify deterministic package
        run: make package-determinism
      - name: Re-run archive smoke test as a distinct CI check
        run: make smoke-release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-package-preview
          path: |
            release/*.zip
            release/*.sha256
            release/*.spdx.json
            release/*.cdx.json
            release/*.buildinfo.json
            release/*.intoto.jsonl
            release/*.release.json
            release/*.checksums.sha256
          if-no-files-found: error
          retention-days: 14

  lean:
    name: Lean kernel and oracle verification
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          auto-config: false
          build: true
          build-args: MarkedRootedClosure
          leanchecker: true
          use-github-cache: true
      - name: Audit exact oracle output
        run: make lean-oracle
      - name: Confirm dependency manifest is unchanged
        run: git diff --exit-code -- lake-manifest.json
